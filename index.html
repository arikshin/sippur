<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סיפור לפני ההכתבה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #c8eaf5;
    --sky-dark: #a8d8ee;
    --purple: #7c3aed;
    --gold: #d4a017;
    --red: #dc2626;
    --white: #ffffff;
    --shadow: rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Frank Ruhl Libre', serif;
    background: linear-gradient(160deg, var(--sky) 0%, #dff0f8 60%, #e8f7fb 100%);
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 28px 20px 18px;
    position: relative;
  }
  .logo {
    font-size: clamp(2rem, 7vw, 3.4rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -1px;
    user-select: none;
  }
  .logo .sippur { color: var(--purple); }
  .logo .lifney { color: var(--gold); }
  .logo .haiktava { color: var(--red); }
  .subtitle {
    font-size: 0.95rem;
    color: #5a7a8a;
    margin-top: 4px;
    font-weight: 400;
  }

  /* ===== BACK BUTTON ===== */
  .back-btn {
    position: absolute;
    top: 28px;
    left: 16px;
    background: white;
    border: 2px solid var(--sky-dark);
    border-radius: 24px;
    padding: 7px 16px;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 0.95rem;
    color: #4a6a7a;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
    z-index: 10;
  }
  .back-btn:hover { background: var(--sky); transform: translateX(-2px); }
  .back-btn.visible { display: flex; }

  /* ===== SCREENS ===== */
  .screen { display: none; animation: fadeIn 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== HOME SCREEN ===== */
  .home-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 10px 20px 40px;
    max-width: 480px;
    margin: 0 auto;
  }

  .mode-card {
    border-radius: 20px;
    padding: 22px 24px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 18px var(--shadow);
    color: white;
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    border: none;
    width: 100%;
    text-align: right;
    font-family: 'Frank Ruhl Libre', serif;
  }
  .mode-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px var(--shadow); }
  .mode-card:active { transform: scale(0.98); }

  .card-purple { background: linear-gradient(135deg, #7c3aed, #9f5ff0); }
  .card-gold   { background: linear-gradient(135deg, #b8860b, #d4a017); }
  .card-red    { background: linear-gradient(135deg, #dc2626, #ef4444); }

  .card-icon { font-size: 2.4rem; flex-shrink: 0; }
  .card-text h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 3px; }
  .card-text p  { font-size: 0.88rem; opacity: 0.9; font-weight: 400; }

  /* ===== INPUT + BUTTON ===== */
  .input-wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: 0 20px;
  }
  .ellipse-input {
    width: 100%;
    border-radius: 50px;
    border: 2.5px solid var(--sky-dark);
    background: white;
    padding: 14px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: #222;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 12px var(--shadow);
    display: block;
    margin-bottom: 14px;
  }
  .ellipse-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
  .ellipse-input::placeholder { color: #aac0cc; font-size: 0.9rem; }

  .round-btn {
    display: block;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: none;
    background: white;
    color: var(--purple);
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    margin: 0 auto 24px;
    box-shadow: 0 4px 20px rgba(124,58,237,0.25);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }
  .round-btn:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(124,58,237,0.35); }
  .round-btn:active { transform: scale(0.97); }
  .round-btn.gold-btn { color: var(--gold); box-shadow: 0 4px 20px rgba(180,130,0,0.25); }
  .round-btn.red-btn  { color: var(--red);  box-shadow: 0 4px 20px rgba(220,38,38,0.25); }

  /* ===== LOADER ===== */
  .loader { display: none; text-align: center; padding: 30px; }
  .loader.show { display: block; }
  .dots { display: inline-flex; gap: 8px; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--purple);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.6; }
    40% { transform: translateY(-14px); opacity: 1; }
  }
  .loader p { margin-top: 14px; color: #5a7a8a; font-size: 0.95rem; }

  /* ===== STORY OUTPUT ===== */
  .story-box {
    background: white;
    border-radius: 20px;
    padding: 24px;
    margin: 16px 20px;
    box-shadow: 0 4px 20px var(--shadow);
    line-height: 1.9;
    font-size: 1.05rem;
    color: #1a2a32;
    display: none;
  }
  .story-box.show { display: block; animation: fadeIn 0.4s ease; }
  .story-box .english-word { color: var(--red); font-weight: 700; font-family: 'Space Mono', monospace; }
  .story-tip {
    margin-top: 16px;
    padding: 12px 16px;
    background: #f0fdf4;
    border-radius: 12px;
    border-right: 4px solid #22c55e;
    font-size: 0.95rem;
    color: #166534;
  }

  /* ===== HISTORY CHIPS ===== */
  .history-section {
    padding: 10px 20px 30px;
    max-width: 480px;
    margin: 0 auto;
  }
  .history-label { font-size: 0.85rem; color: #7a9aaa; margin-bottom: 10px; }
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: white;
    border: 2px solid var(--sky-dark);
    border-radius: 50px;
    padding: 5px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    color: var(--purple);
    cursor: pointer;
    transition: background 0.18s;
  }
  .chip:hover { background: var(--sky); }

  /* ===== MODE 1 — LEARN WORD ===== */
  #screen-learn .section-title,
  #screen-spell .section-title,
  #screen-flash .section-title {
    text-align: center;
    padding: 8px 20px 20px;
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a2a32;
  }

  /* ===== MODE 2 — SPELL CHECK ===== */
  .spell-prompt {
    background: white;
    border-radius: 20px;
    padding: 20px 24px;
    margin: 0 20px 20px;
    box-shadow: 0 4px 18px var(--shadow);
    text-align: center;
    display: none;
  }
  .spell-prompt.show { display: block; animation: fadeIn 0.3s; }
  .spell-meaning { font-size: 1.3rem; font-weight: 700; color: #1a2a32; margin-bottom: 6px; }
  .spell-hint { font-size: 0.9rem; color: #7a9aaa; }
  .spell-result {
    background: white;
    border-radius: 20px;
    padding: 20px 24px;
    margin: 0 20px 16px;
    box-shadow: 0 4px 18px var(--shadow);
    text-align: center;
    font-size: 1.1rem;
    display: none;
  }
  .spell-result.show { display: block; animation: fadeIn 0.3s; }
  .spell-result.success { border-right: 5px solid #22c55e; }
  .spell-result.fail    { border-right: 5px solid var(--red); }

  .action-btn {
    display: inline-block;
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s, transform 0.15s;
  }
  .action-btn:hover { background: #6d28d9; transform: scale(1.04); }
  .action-btn.green { background: #16a34a; }
  .action-btn.green:hover { background: #15803d; }
  .action-btn.gold { background: var(--gold); }

  /* ===== MODE 3 — FLASHCARDS ===== */
  .flashcard-input-area { padding: 0 20px 20px; max-width: 480px; margin: 0 auto; }
  .flashcard-input-area textarea {
    width: 100%;
    border-radius: 16px;
    border: 2.5px solid var(--sky-dark);
    background: white;
    padding: 14px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    color: #222;
    outline: none;
    resize: vertical;
    min-height: 120px;
    box-shadow: 0 2px 12px var(--shadow);
    transition: border-color 0.2s;
    display: block;
    margin-bottom: 14px;
  }
  .flashcard-input-area textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
  .flashcard-input-area textarea::placeholder { color: #aac0cc; }

  /* Card stack */
  .card-stack-wrap {
    perspective: 900px;
    max-width: 380px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    min-height: 220px;
  }
  .flashcard {
    width: 100%;
    min-height: 200px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
    border-radius: 20px;
  }
  .flashcard.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.15);
  }
  .card-front {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    text-align: center;
  }
  .card-back {
    background: white;
    transform: rotateY(180deg);
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a2a32;
    text-align: center;
    flex-direction: column;
    gap: 8px;
  }
  .card-back .tap-hint { font-size: 0.8rem; color: #aaa; font-weight: 400; }
  .card-counter {
    text-align: center;
    font-size: 0.9rem;
    color: #5a7a8a;
    margin-bottom: 14px;
  }
  .card-tap-hint {
    text-align: center;
    font-size: 0.82rem;
    color: #8aaabb;
    margin-top: 10px;
  }

  .card-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 24px;
    padding: 0 20px;
    display: none;
  }
  .card-actions.show { display: flex; animation: fadeIn 0.25s; }
  .emoji-btn {
    background: white;
    border: 3px solid var(--sky-dark);
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 1.5rem;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    box-shadow: 0 3px 12px var(--shadow);
  }
  .emoji-btn:hover { transform: scale(1.12); }
  .emoji-btn.knew { border-color: #22c55e; }
  .emoji-btn.didnt { border-color: var(--red); }

  .done-msg {
    text-align: center;
    padding: 30px 20px;
    display: none;
  }
  .done-msg.show { display: block; animation: fadeIn 0.4s; }
  .done-msg h2 { font-size: 1.8rem; color: var(--purple); margin-bottom: 10px; }
  .done-msg p { color: #5a7a8a; margin-bottom: 20px; }

  /* ===== FLY ANIMATIONS ===== */
  @keyframes flyRight {
    0%   { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateX(160%) rotate(20deg) scale(0.7); opacity: 0; }
  }
  @keyframes flyBottom {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(120px) scale(0.8); opacity: 0; }
  }
  .fly-right  { animation: flyRight  0.45s ease-in forwards; }
  .fly-bottom { animation: flyBottom 0.45s ease-in forwards; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .logo { font-size: 2.1rem; }
    .round-btn { width: 110px; height: 110px; font-size: 1.05rem; }
    .card-front { font-size: 1.4rem; }
    .card-back { font-size: 1.15rem; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" id="backBtn" onclick="goHome()">← חזרה</button>
  <div class="logo">
    <span class="sippur">סיפור</span>
    <span class="lifney"> לפני </span>
    <span class="haiktava">ההכתבה</span>
  </div>
  <div class="subtitle">לומדים אנגלית בכיף</div>
</div>

<!-- ============ HOME SCREEN ============ -->
<div id="screen-home" class="screen active">
  <div class="home-cards">
    <button class="mode-card card-purple" onclick="showScreen('learn')">
      <span class="card-icon">📖</span>
      <div class="card-text">
        <h2>למידת מילה</h2>
        <p>קבל סיפור בעברית עם המילה החדשה</p>
      </div>
    </button>
    <button class="mode-card card-gold" onclick="showScreen('spell')">
      <span class="card-icon">✏️</span>
      <div class="card-text">
        <h2>כתיבת מילה</h2>
        <p>ראה תרגום, כתוב את המילה באנגלית</p>
      </div>
    </button>
    <button class="mode-card card-red" onclick="showScreen('flash')">
      <span class="card-icon">🃏</span>
      <div class="card-text">
        <h2>תרגול תרגום מילה</h2>
        <p>חפיסת כרטיסיות עם הפיכה ותרגום</p>
      </div>
    </button>
  </div>
</div>

<!-- ============ SCREEN 1: LEARN WORD ============ -->
<div id="screen-learn" class="screen">
  <div class="section-title">📖 למידת מילה</div>
  <div class="input-wrap">
    <input class="ellipse-input" id="learnInput" type="text" placeholder="כתוב מילה באנגלית וקבל סיפור" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') getStory()">
  </div>
  <button class="round-btn" onclick="getStory()">קדימה!</button>
  <div class="loader" id="learnLoader">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <p>בונה סיפור...</p>
  </div>
  <div class="story-box" id="storyBox"></div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">חיפושים קודמים:</div>
    <div class="chips-wrap" id="chipsWrap"></div>
  </div>
</div>

<!-- ============ SCREEN 2: SPELL ============ -->
<div id="screen-spell" class="screen">
  <div class="section-title">✏️ כתיבת מילה</div>
  <div class="input-wrap">
    <input class="ellipse-input" id="spellInput" type="text" placeholder="כתוב מילה באנגלית לתרגול" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') loadSpellWord()">
  </div>
  <button class="round-btn gold-btn" onclick="loadSpellWord()">קדימה!</button>
  <div class="loader" id="spellLoader">
    <div class="dots">
      <div class="dot" style="background:var(--gold)"></div>
      <div class="dot" style="background:var(--gold)"></div>
      <div class="dot" style="background:var(--gold)"></div>
    </div>
    <p>טוען תרגום...</p>
  </div>
  <div class="spell-prompt" id="spellPrompt">
    <div class="spell-meaning" id="spellMeaning"></div>
    <div class="spell-hint">כתוב את המילה באנגלית:</div>
    <input class="ellipse-input" id="spellAnswer" type="text" placeholder="..." autocomplete="off" autocorrect="off" spellcheck="false" style="margin-top:14px" onkeydown="if(event.key==='Enter') checkSpell()">
    <button class="action-btn" onclick="checkSpell()">בדוק ←</button>
  </div>
  <div class="spell-result" id="spellResult"></div>
</div>

<!-- ============ SCREEN 3: FLASHCARDS ============ -->
<div id="screen-flash" class="screen">
  <div class="section-title">🃏 תרגול תרגום מילה</div>
  <div class="flashcard-input-area" id="flashInputArea">
    <textarea id="flashWordsInput" placeholder="הכנס מילים באנגלית, מילה בכל שורה:&#10;apple&#10;book&#10;house"></textarea>
    <button class="round-btn red-btn" onclick="startFlash()" style="width:auto;height:auto;border-radius:50px;padding:14px 36px;font-size:1.05rem">בנה כרטיסיות ←</button>
  </div>
  <div id="flashArea" style="display:none">
    <div class="card-counter" id="cardCounter"></div>
    <div class="card-stack-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front" id="cardFront"></div>
        <div class="card-face card-back" id="cardBack">
          <div id="cardBackText"></div>
          <div class="tap-hint">לחץ לחזרה</div>
        </div>
      </div>
    </div>
    <div class="card-tap-hint" id="tapHint">לחץ על הכרטיסייה לגלות את התרגום</div>
    <div class="loader" id="flashLoader" style="padding:10px">
      <div class="dots">
        <div class="dot" style="background:var(--red)"></div>
        <div class="dot" style="background:var(--red)"></div>
        <div class="dot" style="background:var(--red)"></div>
      </div>
    </div>
    <div class="card-actions" id="cardActions">
      <button class="emoji-btn knew" onclick="cardKnew()">😊 ידעתי</button>
      <button class="emoji-btn didnt" onclick="cardDidnt()">😔 לא ידעתי</button>
    </div>
  </div>
  <div class="done-msg" id="flashDone">
    <h2>🎉 כל הכבוד!</h2>
    <p>סיימת את כל הכרטיסיות!</p>
    <button class="action-btn" onclick="restartFlash()">↺ התחל מחדש</button>
    <button class="action-btn" onclick="showScreen('flash')" style="background:#6b7280;margin-right:10px">מילים חדשות</button>
  </div>
</div>

<script>
// ===== NAVIGATION =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('backBtn').classList.toggle('visible', name !== 'home');
  if (name === 'learn') document.getElementById('learnInput').focus();
  if (name === 'spell') document.getElementById('spellInput').focus();
  if (name === 'flash') {
    resetFlashInput();
  }
}

function goHome() {
  showScreen('home');
}

// ===== API CALL =====
async function callGemini(prompt) {
  const res = await fetch('/.netlify/functions/gemini', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  if (!res.ok) throw new Error('שגיאת שרת');
  const data = await res.json();
  return data.text;
}

// ===== SCREEN 1: STORY =====
const searchHistory = [];
const translationCache = {};

async function getStory() {
  const word = document.getElementById('learnInput').value.trim();
  if (!word) return;
  document.getElementById('storyBox').classList.remove('show');
  document.getElementById('learnLoader').classList.add('show');

  const prompt = `כתוב סיפור בעברית של בדיוק 130-150 מילים על המילה האנגלית "${word}".

חוקים:
1. המילה "${word}" מופיעה פעם אחת בלבד בכתיבה האנגלית (סמן אותה עם **${word}**)
2. התעתיק שלה בעברית מופיע לפחות 4 פעמים
3. שם הדמות הראשית מבוסס על צליל המילה
4. כולל בדיחה אחת או שתיים קטנות
5. בסוף הסיפור, בשורה נפרדת, כתוב: "💡 המילה פירושה: [פירוש בעברית]" - בלי לכתוב את המילה האנגלית שוב

החזר את הסיפור בלבד, ללא הסברים נוספים.`;

  try {
    let text = await callGemini(prompt);
    text = text.replace(/\*\*([^*]+)\*\*/g, `<span class="english-word">$1</span>`);
    text = text.replace(/\n/g, '<br>');
    const box = document.getElementById('storyBox');
    box.innerHTML = text;
    box.classList.add('show');

    if (!searchHistory.includes(word)) {
      searchHistory.unshift(word);
      if (searchHistory.length > 10) searchHistory.pop();
      renderChips();
    }
  } catch(e) {
    document.getElementById('storyBox').innerHTML = '❌ שגיאה בטעינת הסיפור. נסה שוב.';
    document.getElementById('storyBox').classList.add('show');
  }
  document.getElementById('learnLoader').classList.remove('show');
}

function renderChips() {
  const section = document.getElementById('historySection');
  const wrap = document.getElementById('chipsWrap');
  section.style.display = searchHistory.length ? 'block' : 'none';
  wrap.innerHTML = searchHistory.map(w =>
    `<span class="chip" onclick="document.getElementById('learnInput').value='${w}';getStory()">${w}</span>`
  ).join('');
}

// ===== SCREEN 2: SPELL =====
let currentSpellWord = '';

async function loadSpellWord() {
  const word = document.getElementById('spellInput').value.trim();
  if (!word) return;
  currentSpellWord = word.toLowerCase();

  document.getElementById('spellPrompt').classList.remove('show');
  document.getElementById('spellResult').classList.remove('show');
  document.getElementById('spellLoader').classList.add('show');

  let meaning = translationCache[currentSpellWord];
  if (!meaning) {
    try {
      const prompt = `תרגם את המילה האנגלית "${word}" לעברית. החזר רק את התרגום הקצר בעברית, ללא הסברים.`;
      meaning = await callGemini(prompt);
      meaning = meaning.trim();
      translationCache[currentSpellWord] = meaning;
    } catch(e) {
      meaning = 'שגיאה בטעינה';
    }
  }

  document.getElementById('spellLoader').classList.remove('show');
  document.getElementById('spellMeaning').textContent = meaning;
  document.getElementById('spellAnswer').value = '';
  document.getElementById('spellPrompt').classList.add('show');
  document.getElementById('spellAnswer').focus();
}

function checkSpell() {
  const answer = document.getElementById('spellAnswer').value.trim().toLowerCase();
  const result = document.getElementById('spellResult');
  result.classList.remove('show', 'success', 'fail');

  if (answer === currentSpellWord) {
    result.innerHTML = `🎉 כל הכבוד! הצלחת!<br><button class="action-btn green" onclick="retrySpell()">תרגל שוב ←</button>`;
    result.classList.add('success');
  } else {
    result.innerHTML = `😔 אוף, הפעם לא הצלחת.<br>הכתיבה הנכונה היא: <strong style="font-family:'Space Mono',monospace;color:var(--red)">${currentSpellWord}</strong><br><button class="action-btn" onclick="retrySpell()">נסה שוב ←</button>`;
    result.classList.add('fail');
  }
  result.classList.add('show');
  document.getElementById('spellPrompt').classList.remove('show');
}

function retrySpell() {
  document.getElementById('spellResult').classList.remove('show');
  document.getElementById('spellAnswer').value = '';
  document.getElementById('spellPrompt').classList.add('show');
  document.getElementById('spellAnswer').focus();
}

// ===== SCREEN 3: FLASHCARDS =====
let flashDeck = [];
let currentCardIdx = 0;
let isFlipped = false;
let isAnimating = false;

function resetFlashInput() {
  document.getElementById('flashInputArea').style.display = 'block';
  document.getElementById('flashArea').style.display = 'none';
  document.getElementById('flashDone').classList.remove('show');
  document.getElementById('flashWordsInput').value = '';
}

async function startFlash() {
  const raw = document.getElementById('flashWordsInput').value.trim();
  if (!raw) return;
  const words = [...new Set(raw.split('\n').map(w => w.trim()).filter(Boolean))];
  if (!words.length) return;

  flashDeck = words.map(w => ({ word: w, translation: translationCache[w.toLowerCase()] || null }));
  currentCardIdx = 0;
  isFlipped = false;

  document.getElementById('flashInputArea').style.display = 'none';
  document.getElementById('flashArea').style.display = 'block';
  document.getElementById('flashDone').classList.remove('show');
  renderCard();
}

function renderCard() {
  if (currentCardIdx >= flashDeck.length) {
    showDone();
    return;
  }
  const card = flashDeck[currentCardIdx];
  document.getElementById('cardFront').textContent = card.word;
  document.getElementById('cardBackText').textContent = card.translation || '...';
  document.getElementById('cardCounter').textContent = `כרטיסייה ${currentCardIdx + 1} מתוך ${flashDeck.length}`;

  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
  isFlipped = false;
  document.getElementById('cardActions').classList.remove('show');
  document.getElementById('tapHint').style.display = 'block';

  if (!card.translation) {
    loadTranslation(card);
  }
}

async function loadTranslation(card) {
  document.getElementById('flashLoader').classList.add('show');
  try {
    const prompt = `תרגם את המילה האנגלית "${card.word}" לעברית. החזר רק את התרגום הקצר בעברית.`;
    const t = await callGemini(prompt);
    card.translation = t.trim();
    translationCache[card.word.toLowerCase()] = card.translation;
    if (currentCardIdx < flashDeck.length && flashDeck[currentCardIdx] === card) {
      document.getElementById('cardBackText').textContent = card.translation;
    }
  } catch(e) {
    card.translation = '⚠️ שגיאה';
  }
  document.getElementById('flashLoader').classList.remove('show');
}

function flipCard() {
  if (isAnimating) return;
  const fc = document.getElementById('flashcard');
  if (!isFlipped) {
    fc.classList.add('flipped');
    isFlipped = true;
    document.getElementById('tapHint').style.display = 'none';
    document.getElementById('cardActions').classList.add('show');
  } else {
    fc.classList.remove('flipped');
    isFlipped = false;
    document.getElementById('tapHint').style.display = 'block';
    document.getElementById('cardActions').classList.remove('show');
  }
}

function cardKnew() {
  if (isAnimating) return;
  isAnimating = true;
  const fc = document.getElementById('flashcard');
  fc.classList.add('fly-right');
  document.getElementById('cardActions').classList.remove('show');
  setTimeout(() => {
    fc.classList.remove('fly-right', 'flipped');
    flashDeck.splice(currentCardIdx, 1);
    if (currentCardIdx >= flashDeck.length) currentCardIdx = 0;
    isAnimating = false;
    renderCard();
  }, 460);
}

function cardDidnt() {
  if (isAnimating) return;
  isAnimating = true;
  const fc = document.getElementById('flashcard');
  fc.classList.add('fly-bottom');
  document.getElementById('cardActions').classList.remove('show');
  setTimeout(() => {
    fc.classList.remove('fly-bottom', 'flipped');
    const card = flashDeck.splice(currentCardIdx, 1)[0];
    flashDeck.push(card);
    if (currentCardIdx >= flashDeck.length) currentCardIdx = 0;
    isAnimating = false;
    renderCard();
  }, 460);
}

function showDone() {
  document.getElementById('flashArea').style.display = 'none';
  document.getElementById('flashDone').classList.add('show');
}

function restartFlash() {
  document.getElementById('flashDone').classList.remove('show');
  document.getElementById('flashInputArea').style.display = 'none';
  document.getElementById('flashArea').style.display = 'block';
  // reload original words from textarea
  const raw = document.getElementById('flashWordsInput').value.trim();
  const words = [...new Set(raw.split('\n').map(w => w.trim()).filter(Boolean))];
  flashDeck = words.map(w => ({ word: w, translation: translationCache[w.toLowerCase()] || null }));
  currentCardIdx = 0;
  renderCard();
}
</script>
